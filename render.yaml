services:
  - type: web
    name: ips-ups-patcher-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: CACHE_CHANNEL_ID
        sync: false
      - key: DB_NAME
        sync: false
      - key: MAX_QUEUE_SIZE
        sync: false
      - key: MAX_FILE_SIZE
        sync: false
      - key: LOG_LEVEL
        sync: false
      - key: OWNER_NAME
        sync: false
